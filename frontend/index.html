<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finmas - Gestão Financeira</title>
    <meta name="description" content="Sistema completo de gestão financeira pessoal e análise de investimentos" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <style>
      html, body { margin: 0; padding: 0; }
      #initial-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at top, #1e293b 0%, #0f172a 55%, #0b1120 100%);
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, "Helvetica Neue", sans-serif;
        transition: opacity 0.35s ease-out;
        -webkit-font-smoothing: antialiased;
      }
      #initial-splash .splash-logo {
        font-size: 2.75rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0 0 0.6rem 0;
        line-height: 1;
      }
      #initial-splash .splash-subtitle {
        font-size: 0.75rem;
        color: #94a3b8;
        margin: 0 0 2rem 0;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      #initial-splash .splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(59, 130, 246, 0.18);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      body.app-ready #initial-splash {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-splash .splash-spinner { animation: none; }
        #initial-splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="initial-splash" aria-hidden="true">
      <div class="splash-logo">Finmas</div>
      <div class="splash-subtitle">Gestão Financeira</div>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
